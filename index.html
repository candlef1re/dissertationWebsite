<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Entry</title>
  <style>
    :root{
      --bg1:#0b1020;
      --bg2:#121a2f;
      --card:rgba(255,255,255,0.08);
      --card-border:rgba(255,255,255,0.14);
      --text:#eef4ff;
      --muted:rgba(238,244,255,0.72);
      --accent:#4da3ff;
      --accent2:#41d39b;
      --shadow:0 20px 50px rgba(0,0,0,0.35);
    }

    *{box-sizing:border-box;}
    html,body{
      margin:0;
      padding:0;
      min-height:100%;
      font-family:Roboto,system-ui,-apple-system,"Segoe UI",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(77,163,255,0.18), transparent 28%),
        radial-gradient(circle at top right, rgba(65,211,155,0.12), transparent 24%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }

    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .wrap{
      width:100%;
      max-width:1180px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--card-border);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
      backdrop-filter: blur(10px);
    }

    .hero{
      padding:28px 28px 16px;
      border-bottom:1px solid rgba(255,255,255,0.08);
    }

    .title{
      margin:0 0 10px;
      font-size:32px;
      font-weight:700;
      letter-spacing:.2px;
    }

    .subtitle{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.7;
    }

    .lang-switch{
      display:flex;
      gap:10px;
      margin-top:18px;
      flex-wrap:wrap;
    }

    .lang-btn{
      border:none;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,0.08);
      color:var(--text);
      border:1px solid rgba(255,255,255,0.14);
      cursor:pointer;
      font-size:14px;
      transition:all .18s ease;
    }

    .lang-btn.active{
      background:var(--accent);
      border-color:rgba(77,163,255,0.45);
      color:#fff;
    }

    .content{
      padding:24px 28px 28px;
    }

    .section-title{
      margin:0 0 14px;
      font-size:18px;
      font-weight:700;
    }

    .section-desc{
      margin:0 0 22px;
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:18px;
    }

    .option{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.10);
      border-radius:20px;
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:14px;
      min-height:240px;
    }

    .badge{
      display:inline-flex;
      align-self:flex-start;
      padding:6px 12px;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      letter-spacing:.2px;
      border:1px solid rgba(255,255,255,0.10);
      color:#fff;
      background:rgba(255,255,255,0.08);
    }

    .option h3{
      margin:0;
      font-size:22px;
    }

    .option p{
      margin:0;
      color:var(--muted);
      line-height:1.7;
      font-size:14px;
      flex:1;
    }

    .meta{
      display:grid;
      gap:8px;
      font-size:13px;
      color:rgba(238,244,255,0.86);
    }

    .go-btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      border:none;
      padding:12px 16px;
      border-radius:14px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:transform .15s ease, opacity .15s ease;
      background:linear-gradient(90deg, var(--accent), var(--accent2));
      color:#fff;
    }

    .go-btn:hover{
      transform:translateY(-1px);
    }

    .footer{
      margin-top:18px;
      color:var(--muted);
      font-size:13px;
      line-height:1.7;
      text-align:center;
    }

    @media (max-width: 980px){
      .grid{grid-template-columns:repeat(2, 1fr);}
    }

    @media (max-width: 760px){
      .title{font-size:26px;}
      .grid{grid-template-columns:1fr;}
      .hero,.content{padding-left:18px;padding-right:18px;}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <h1 class="title" id="title">欢迎参加本实验</h1>
        <p class="subtitle" id="subtitle">
          请先选择语言，然后点击下方任意一个入口开始测试。
        </p>

        <div class="lang-switch">
          <button class="lang-btn active" id="btn-zh" type="button">中文</button>
          <button class="lang-btn" id="btn-en" type="button">English</button>
        </div>
      </div>

      <div class="content">
        <h2 class="section-title" id="section-title">请选择一个页面开始</h2>
        <p class="section-desc" id="section-desc">
          两个入口都是实验页面，请根据根据实验描述依次运行。
        </p>

        <div class="grid">
          <div class="option">
            <div class="badge" id="badge-a">入口 A</div>
            <h3 id="option-a-title">页面 1</h3>
            <p id="option-a-desc">
              点击后进入实验页面 1。
            </p>
            <div class="meta" id="option-a-meta">
              <div>语言：中文</div>
              <div>说明：请按提示完成测试</div>
            </div>
            <a class="go-btn" id="option-a-link" href="unopCN.html">进入页面 1</a>
          </div>

          <div class="option">
            <div class="badge" id="badge-b">入口 2</div>
            <h3 id="option-b-title">页面 2</h3>
            <p id="option-b-desc">
              点击后进入实验页面 2。
            </p>
            <div class="meta" id="option-b-meta">
              <div>语言：中文</div>
              <div>说明：请按提示完成测试</div>
            </div>
            <a class="go-btn" id="option-b-link" href="semiOPCN.html">进入页面 2</a>
          </div>

          <div class="option">
            <div class="badge" id="badge-c">入口 C</div>
            <h3 id="option-c-title">页面 3</h3>
            <p id="option-c-desc">
              点击后进入实验页面 3。
            </p>
            <div class="meta" id="option-c-meta">
              <div>语言：中文</div>
              <div>说明：请按提示完成测试</div>
            </div>
            <a class="go-btn" id="option-c-link" href="fullopCN.html">进入页面 3</a>
          </div>
        </div>

        <div class="footer" id="footer">
          请在安静环境下完成，并尽量不要中途刷新页面。
        </div>
      </div>
    </div>
  </div>

  <script>
    var textMap = {
      zh: {
        title: "欢迎参加本实验",
        subtitle: "请先选择语言，然后点击下方任意一个入口开始测试。",
        sectionTitle: "请选择一个页面开始",
        sectionDesc: "三个入口都是实验页面，请根据实验安排选择对应版本。",
        badgeA: "入口 A",
        badgeB: "入口 B",
        badgeC: "入口 C",
        optionATitle: "页面 A",
        optionBTitle: "页面 B",
        optionCTitle: "页面 C",
        optionADesc: "点击后进入实验页面 A。",
        optionBDesc: "点击后进入实验页面 B。",
        optionCDesc: "点击后进入实验页面 C。",
        optionAMeta: "<div>语言：中文</div><div>说明：请按提示完成测试</div>",
        optionBMeta: "<div>语言：中文</div><div>说明：请按提示完成测试</div>",
        optionCMeta: "<div>语言：中文</div><div>说明：请按提示完成测试</div>",
        optionABtn: "进入页面 A",
        optionBBtn: "进入页面 B",
        optionCBtn: "进入页面 C",
        footer: "请在安静环境下完成，并尽量不要中途刷新页面。",
        linkA: "unopCN.html",
        linkB: "opCN.html",
        linkC: "fullopCN.html"
      },
      en: {
        title: "Welcome to This Study",
        subtitle: "Please choose your language first, then click one of the options below to begin.",
        sectionTitle: "Please choose a page to start",
        sectionDesc: "All three options are study pages. Please select the version assigned to you.",
        badgeA: "Option A",
        badgeB: "Option B",
        badgeC: "Option C",
        optionATitle: "Page A",
        optionBTitle: "Page B",
        optionCTitle: "Page C",
        optionADesc: "Click to enter Study Page A.",
        optionBDesc: "Click to enter Study Page B.",
        optionCDesc: "Click to enter Study Page C.",
        optionAMeta: "<div>Language: English</div><div>Note: please complete the task as instructed</div>",
        optionBMeta: "<div>Language: English</div><div>Note: please complete the task as instructed</div>",
        optionCMeta: "<div>Language: English</div><div>Note: please complete the task as instructed</div>",
        optionABtn: "Enter Page A",
        optionBBtn: "Enter Page B",
        optionCBtn: "Enter Page C",
        footer: "Please complete the study in a quiet environment and avoid refreshing the page midway.",
        linkA: "unopEng.html",
        linkB: "opEng.html",
        linkC: "fullopEng.html"
      }
    };

    function applyLanguage(lang){
      var t = textMap[lang];
      document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";

      document.getElementById("title").textContent = t.title;
      document.getElementById("subtitle").textContent = t.subtitle;
      document.getElementById("section-title").textContent = t.sectionTitle;
      document.getElementById("section-desc").textContent = t.sectionDesc;

      document.getElementById("badge-a").textContent = t.badgeA;
      document.getElementById("badge-b").textContent = t.badgeB;
      document.getElementById("badge-c").textContent = t.badgeC;

      document.getElementById("option-a-title").textContent = t.optionATitle;
      document.getElementById("option-b-title").textContent = t.optionBTitle;
      document.getElementById("option-c-title").textContent = t.optionCTitle;

      document.getElementById("option-a-desc").textContent = t.optionADesc;
      document.getElementById("option-b-desc").textContent = t.optionBDesc;
      document.getElementById("option-c-desc").textContent = t.optionCDesc;

      document.getElementById("option-a-meta").innerHTML = t.optionAMeta;
      document.getElementById("option-b-meta").innerHTML = t.optionBMeta;
      document.getElementById("option-c-meta").innerHTML = t.optionCMeta;

      document.getElementById("option-a-link").textContent = t.optionABtn;
      document.getElementById("option-b-link").textContent = t.optionBBtn;
      document.getElementById("option-c-link").textContent = t.optionCBtn;

      document.getElementById("option-a-link").href = t.linkA;
      document.getElementById("option-b-link").href = t.linkB;
      document.getElementById("option-c-link").href = t.linkC;

      document.getElementById("footer").textContent = t.footer;

      document.getElementById("btn-zh").classList.toggle("active", lang === "zh");
      document.getElementById("btn-en").classList.toggle("active", lang === "en");
    }

    document.getElementById("btn-zh").addEventListener("click", function(){
      applyLanguage("zh");
    });

    document.getElementById("btn-en").addEventListener("click", function(){
      applyLanguage("en");
    });

    applyLanguage("zh");
  </script>
</body>
</html>
